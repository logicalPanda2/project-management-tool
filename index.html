<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/vite.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>frontend</title>
	</head>
	<body class="bg-default">
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
        <script>
            const admin_email = "admin@account.org";
            const admin_role = "CREATOR";
            const contributor_email = "contributor@account.org";
            const contributor_role = "CONTRIBUTOR";
            const admin_id = crypto.randomUUID();
            const contributor_id = crypto.randomUUID();
            const projectId = crypto.randomUUID();
            const projectId2 = crypto.randomUUID();
            const project = {
                title: "Shared project",
                description: "This is a project made to demonstrate the app's features. Right now, you're using the admin account. Both accounts: admin and contributor, can view this project.",
                status: "COMPLETE",
                id: projectId,
            }
            const project2 = {
                title: "Secret project",
                description: "Only the admin account can see this project.",
                status: "INCOMPLETE",
                id: projectId2,
            }
            const tasks = [
                {
                    title: "While you're an admin, you can revert the project's status and mark tasks as done. Try marking this task as done!",
                    status: "INCOMPLETE",
                    id: crypto.randomUUID(),
                },
                {
                    title: "You can also edit this project freely, but only while you're an admin.",
                    status: "INCOMPLETE",
                    id: crypto.randomUUID(),
                },
                {
                    title: "If you go to the edit page then switch to the contributor account, you'll be redirected to a 404 page.",
                    status: "INCOMPLETE",
                    id: crypto.randomUUID(),
                }
            ]
            const tasks2 = [
                {
                    title: "The contributor account isn't invited to this project.",
                    status: "INCOMPLETE",
                    id: crypto.randomUUID(),
                },
                {
                    title: "If you switch to the contributor account now, you'll be redirected to a 404 page.",
                    status: "INCOMPLETE",
                    id: crypto.randomUUID(),
                },
            ]
            const comments = [
                {
                    title: "While you're an admin, you can delete any comment.",
                    email: "admin@account.org",
                    id: crypto.randomUUID(),
                },
                {
                    title: "Try deleting this comment made by a different user.",
                    email: "contributor@account.org",
                    id: crypto.randomUUID(),
                },
                {
                    title: "Click the button on the top right corner to switch to the contributor account.",
                    email: "admin@account.org",
                    id: crypto.randomUUID(),
                },
            ]
            const projects = JSON.parse(localStorage.getItem("projects"));
            if(!projects || projects.length === 0) {
                localStorage.setItem("projects", JSON.stringify([project, project2]));
                localStorage.setItem(
                    `project/${projectId}/tasks`,
                    JSON.stringify(tasks),
                );
                localStorage.setItem(
                    `project/${projectId}/comments`,
                    JSON.stringify(comments),
                );
                localStorage.setItem(
                    `project/${projectId}/members`,
                    JSON.stringify([
                        {
                            email: admin_email,
                            id: admin_id,
                        },
                        {
                            email: contributor_email,
                            id: contributor_id,
                        },
                    ]
                ));

                localStorage.setItem(
                    `project/${projectId2}/tasks`,
                    JSON.stringify(tasks2),
                );
                localStorage.setItem(
                    `project/${projectId2}/members`,
                    JSON.stringify([
                        {
                            email: admin_email,
                            id: admin_id,
                        },
                    ]
                ));

                localStorage.setItem("admin_email", admin_email);
                localStorage.setItem("admin_role", admin_role);
                localStorage.setItem("contributor_email", contributor_email);
                localStorage.setItem("contributor_role", contributor_role);
                localStorage.setItem("admin_id", admin_id);
                localStorage.setItem("contributor_id", contributor_id);
                localStorage.setItem("current", "CREATOR");
            }
        </script>
	</body>
</html>
